<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520" role="img" aria-label="Lowpoly phoenix in fire and magenta">
  <defs>
    <radialGradient id="aura" cx="50%" cy="44%" r="62%">
      <stop offset="0" stop-color="#ffe27a" stop-opacity="0.95"/>
      <stop offset="0.18" stop-color="#ffaa3a" stop-opacity="0.78"/>
      <stop offset="0.42" stop-color="#ff4f1a" stop-opacity="0.55"/>
      <stop offset="0.65" stop-color="#c41e7a" stop-opacity="0.40"/>
      <stop offset="0.85" stop-color="#5a0832" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#0a0210" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="52%">
      <stop offset="0" stop-color="#ff5cb6" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#c41e7a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3a0420" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="520" fill="#0c0210"/>
  <ellipse cx="200" cy="230" rx="240" ry="260" fill="url(#aura)"/>
  <ellipse cx="200" cy="220" rx="210" ry="220" fill="url(#halo)"/>

  <!-- ======== RIGHT WING (raised, sweeping up & out) ========
       Anchor at right shoulder (215, 270). Tips arc up-out then down-out.
  -->
  <g>
    <!-- inner-shoulder strip -->
    <polygon points="215,270 235,225 255,200" fill="#a8154f"/>
    <polygon points="215,270 255,200 230,205" fill="#d22a62"/>
    <!-- mid feathers -->
    <polygon points="215,270 255,200 290,160" fill="#e84a2a"/>
    <polygon points="215,270 290,160 280,200" fill="#ff6f1a"/>
    <polygon points="215,270 290,160 325,118" fill="#ff8a3a"/>
    <polygon points="215,270 325,118 318,170" fill="#ffaa3a"/>
    <!-- upper feathers -->
    <polygon points="215,270 325,118 358,82"  fill="#ffd24a"/>
    <polygon points="215,270 358,82  370,138" fill="#ffe27a"/>
    <!-- topmost tip (highest, hot) -->
    <polygon points="215,270 358,82  340,42"  fill="#fff2b0"/>
    <polygon points="215,270 340,42  315,55"  fill="#ffd86a"/>
    <!-- outer wing leading edge sweeping back -->
    <polygon points="215,270 370,138 392,180" fill="#ff8a3a"/>
    <polygon points="215,270 392,180 388,232" fill="#e84a2a"/>
    <polygon points="215,270 388,232 358,260" fill="#d22a62"/>
    <!-- outer trailing tips (curling back / down-out, magenta) -->
    <polygon points="215,270 358,260 320,275" fill="#a8154f"/>
    <polygon points="215,270 320,275 285,272" fill="#7a0a3a"/>
  </g>

  <!-- ======== LEFT WING (mirror) ======== -->
  <g>
    <polygon points="185,270 165,225 145,200" fill="#a8154f"/>
    <polygon points="185,270 145,200 170,205" fill="#d22a62"/>
    <polygon points="185,270 145,200 110,160" fill="#e84a2a"/>
    <polygon points="185,270 110,160 120,200" fill="#ff6f1a"/>
    <polygon points="185,270 110,160 75,118"  fill="#ff8a3a"/>
    <polygon points="185,270 75,118  82,170"  fill="#ffaa3a"/>
    <polygon points="185,270 75,118  42,82"   fill="#ffd24a"/>
    <polygon points="185,270 42,82   30,138"  fill="#ffe27a"/>
    <polygon points="185,270 42,82   60,42"   fill="#fff2b0"/>
    <polygon points="185,270 60,42   85,55"   fill="#ffd86a"/>
    <polygon points="185,270 30,138  8,180"   fill="#ff8a3a"/>
    <polygon points="185,270 8,180   12,232"  fill="#e84a2a"/>
    <polygon points="185,270 12,232  42,260"  fill="#d22a62"/>
    <polygon points="185,270 42,260  80,275"  fill="#a8154f"/>
    <polygon points="185,270 80,275  115,272" fill="#7a0a3a"/>
  </g>

  <!-- ======== INNER GLOW between wings (chest fire core) ======== -->
  <g>
    <polygon points="200,290 175,205 200,180" fill="#ffd24a"/>
    <polygon points="200,290 200,180 225,205" fill="#ffd24a"/>
    <polygon points="200,290 175,205 195,235" fill="#ffaa3a"/>
    <polygon points="200,290 225,205 205,235" fill="#ffaa3a"/>
    <polygon points="200,290 195,235 205,235" fill="#ff8a3a"/>
    <polygon points="200,180 192,160 208,160" fill="#fff2b0"/>
    <polygon points="200,180 192,160 188,180" fill="#ffe27a"/>
    <polygon points="200,180 208,160 212,180" fill="#ffe27a"/>
    <polygon points="200,160 196,140 204,140" fill="#fff8d0"/>
  </g>

  <!-- ======== BODY (heart / chest area) ======== -->
  <g>
    <polygon points="180,280 220,280 200,335" fill="#d22a62"/>
    <polygon points="180,280 200,335 162,318" fill="#a8154f"/>
    <polygon points="220,280 238,318 200,335" fill="#a8154f"/>
    <polygon points="187,288 213,288 200,322" fill="#ff6f1a"/>
    <polygon points="193,295 207,295 200,315" fill="#ffaa3a"/>
    <polygon points="197,300 203,300 200,310" fill="#ffe27a"/>
  </g>

  <!-- ======== HEAD (forward-down, prominent) ======== -->
  <g>
    <!-- back of head / nape -->
    <polygon points="200,260 218,270 205,290" fill="#ffaa3a"/>
    <polygon points="200,260 205,290 188,288" fill="#ffd24a"/>
    <!-- crown -->
    <polygon points="200,260 192,240 208,240" fill="#fff2b0"/>
    <polygon points="200,240 192,240 196,225" fill="#ffe27a"/>
    <polygon points="200,240 208,240 204,225" fill="#ffe27a"/>
    <!-- face / cheek -->
    <polygon points="188,288 205,290 192,308" fill="#ffe27a"/>
    <polygon points="188,288 192,308 170,300" fill="#ffd24a"/>
    <polygon points="170,300 188,288 165,283" fill="#ffaa3a"/>
    <polygon points="170,300 192,308 178,318" fill="#ff8a3a"/>
    <!-- beak -->
    <polygon points="170,300 165,283 148,295" fill="#ff6f1a"/>
    <polygon points="148,295 170,300 154,310" fill="#a8154f"/>
    <polygon points="148,295 154,310 162,302" fill="#7a0a3a"/>
    <!-- eye -->
    <polygon points="184,288 191,285 189,295" fill="#0c0210"/>
    <polygon points="186,288 189,287 188,292" fill="#fff8d0"/>
  </g>

  <!-- ======== TAIL (long curving plumes down-right) ======== -->
  <g>
    <polygon points="208,330 235,322 245,360"  fill="#d22a62"/>
    <polygon points="235,322 270,338 245,360"  fill="#ff6f1a"/>
    <polygon points="245,360 270,338 295,372"  fill="#e84a2a"/>
    <polygon points="245,360 295,372 275,400"  fill="#d22a62"/>
    <polygon points="275,400 295,372 322,395"  fill="#a8154f"/>
    <polygon points="275,400 322,395 305,432"  fill="#c41e7a"/>
    <polygon points="305,432 322,395 352,418"  fill="#7a0a3a"/>
    <polygon points="305,432 352,418 332,460"  fill="#a8154f"/>
    <polygon points="332,460 352,418 372,468"  fill="#5a0832"/>
    <polygon points="332,460 372,468 348,498"  fill="#7a0a3a"/>

    <!-- secondary inner wisp -->
    <polygon points="200,335 222,328 220,360"  fill="#ff8a3a"/>
    <polygon points="220,360 222,328 250,368"  fill="#ff6f1a"/>
    <polygon points="220,360 250,368 232,398"  fill="#d22a62"/>
    <polygon points="232,398 250,368 268,408"  fill="#a8154f"/>
    <polygon points="232,398 268,408 248,438"  fill="#7a0a3a"/>

    <!-- left curling stray plume -->
    <polygon points="195,335 178,348 168,378"  fill="#a8154f"/>
    <polygon points="168,378 178,348 158,372"  fill="#7a0a3a"/>
    <polygon points="158,372 178,348 152,402"  fill="#5a0832"/>
  </g>
</svg>
